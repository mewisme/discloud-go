name: Bug report
description: Something is broken or unexpected
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Do **not** include Discord bot tokens or other secrets.
  - type: textarea
    id: describe
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g. v0.1.0 or git SHA
  - type: dropdown
    id: deploy
    attributes:
      label: How are you running DisCloud?
      options:
        - Docker Compose
        - Local (go run / pnpm)
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant API logs (redact secrets).
      render: shell
