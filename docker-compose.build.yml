# Local source builds. Usage:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up --build -d
services:
  api:
    image: discloud-api:local
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile.api

  web:
    image: discloud-web:local
    pull_policy: build
    build:
      context: web
