version: 2
project_name: discloud

builds:
  - id: discloud
    main: ./cmd/discloud
    binary: discloud
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}

  - id: discloud-cli
    main: ./cmd/discloud-cli
    binary: discloud-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  # Server binary (linux only — matches builds.discloud).
  - id: discloud
    ids: [discloud]
    formats: [tar.gz]
    name_template: "discloud_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

  # CLI client (multi-OS). Name must differ from project_name default.
  - id: discloud-cli
    ids: [discloud-cli]
    formats: [tar.gz]
    name_template: "discloud-cli_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))?!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))?!?:.+$'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs"
      - "^test"
      - "^chore"

dockers_v2:
  - images:
      - ghcr.io/mewisme/discloud
    ids: [discloud]
    dockerfile: Dockerfile.goreleaser
    # Context is only binaries + Dockerfile; seed /data needs this dir.
    extra_files:
      - data
    tags:
      - "v{{ .Version }}"
      - "{{ if not .Prerelease }}latest{{ end }}"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      "org.opencontainers.image.source": "https://github.com/mewisme/discloud-go"
      "org.opencontainers.image.description": "Unlimited cloud storage backed by Discord attachments"
      "org.opencontainers.image.licenses": "MIT"

scoops:
  - name: discloud-cli
    ids: [discloud-cli]
    url_template: "https://github.com/mewisme/discloud-go/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    homepage: "https://github.com/mewisme/discloud-go"
    description: "CLI client for DisCloud (Discord-backed file storage)"
    license: MIT
    skip_upload: true
    # Alias: `discloud` → discloud-cli.exe (Scoop shim API).
    post_install:
      - 'shim "$dir\discloud-cli.exe" $global discloud'
    repository:
      owner: mewisme
      name: scoop-mew
      branch: main

homebrew_casks:
  - name: discloud-cli
    ids: [discloud-cli]
    binaries:
      - discloud-cli
    homepage: "https://github.com/mewisme/discloud-go"
    description: "CLI client for DisCloud (Discord-backed file storage)"
    directory: Casks
    skip_upload: true
    # Runs `discloud-cli completion <shell>` at cask install (Cobra).
    generate_completions_from_executable:
      executable: discloud-cli
      base_name: discloud
      shell_parameter_format: cobra
      shells: [bash, zsh, fish]
    hooks:
      post:
        install: |
          FileUtils.ln_sf "#{staged_path}/discloud-cli", "#{staged_path}/discloud"
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/discloud-cli"]
          end
    repository:
      owner: mewisme
      name: homebrew-mew
      branch: main

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

release:
  draft: false
