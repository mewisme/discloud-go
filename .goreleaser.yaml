version: 2
project_name: discloud

builds:
  - id: discloud
    main: ./cmd/discloud
    binary: discloud
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))?!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))?!?:.+$'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs"
      - "^test"
      - "^chore"

dockers_v2:
  - images:
      - ghcr.io/mewisme/discloud
    dockerfile: Dockerfile.goreleaser
    tags:
      - "v{{ .Version }}"
      - "{{ if not .Prerelease }}latest{{ end }}"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      "org.opencontainers.image.source": "https://github.com/mewisme/discloud-go"
      "org.opencontainers.image.description": "Unlimited cloud storage backed by Discord attachments"
      "org.opencontainers.image.licenses": "MIT"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

release:
  draft: false
