name: discloud

services:
  api:
    container_name: discloud-api
    image: ghcr.io/mewisme/discloud:${DISCLOUD_TAG:-latest}
    pull_policy: always
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://discloud:${POSTGRES_PASSWORD:-discloud}@postgres:5432/discloud
      VALKEY_URL: valkey://valkey:6379
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:?set in .env}
      DISCORD_CHANNEL_ID: ${DISCORD_CHANNEL_ID:?set in .env}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      GOMEMLIMIT: 96MiB
      GOGC: "50"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks: [discloud]
    mem_limit: 128m
    mem_reservation: 32m
    restart: unless-stopped

  web:
    container_name: discloud-web
    image: ghcr.io/mewisme/discloud-web:${DISCLOUD_TAG:-latest}
    pull_policy: always
    environment:
      # Browser-facing API origin (not the Docker-internal hostname).
      API_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      NODE_OPTIONS: --max-old-space-size=192
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks: [discloud]
    mem_limit: 256m
    mem_reservation: 64m
    restart: unless-stopped

  postgres:
    container_name: discloud-postgres
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: discloud
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-discloud}
      POSTGRES_DB: discloud
    # Metadata store only — keep the shared buffer pool and connection count tiny.
    command:
      - postgres
      - -c
      - shared_buffers=32MB
      - -c
      - effective_cache_size=64MB
      - -c
      - work_mem=1MB
      - -c
      - maintenance_work_mem=16MB
      - -c
      - wal_buffers=512kB
      - -c
      - max_connections=20
      - -c
      - min_wal_size=32MB
      - -c
      - max_wal_size=64MB
      - -c
      - checkpoint_completion_target=0.9
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discloud -d discloud"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [discloud]
    mem_limit: 128m
    mem_reservation: 48m
    restart: unless-stopped

  valkey:
    container_name: discloud-valkey
    image: valkey/valkey:8-alpine
    # CDN URL cache is reconstructable — skip disk persistence to keep RSS low.
    command:
      - valkey-server
      - --maxmemory
      - 24mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
      - --appendonly
      - "no"
      - --tcp-backlog
      - "128"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [discloud]
    mem_limit: 32m
    mem_reservation: 8m
    restart: unless-stopped

networks:
  discloud:
    name: discloud
    driver: bridge

volumes:
  pgdata:
    name: discloud-pgdata
